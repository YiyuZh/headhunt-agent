x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-docker}
  APP_NAME: ${APP_NAME:-AI Headhunter War Room}
  APP_VERSION: ${APP_VERSION:-0.1.0}
  INTERNAL_ADMIN_API_KEY: ${INTERNAL_ADMIN_API_KEY:?set INTERNAL_ADMIN_API_KEY}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lietou}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_INTERNAL_PORT:-5432}/${POSTGRES_DB:-lietou}
  CHECKPOINT_DB_URL: postgresql+psycopg://${POSTGRES_USER:-lietou}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_INTERNAL_PORT:-5432}/${POSTGRES_DB:-lietou}
  VECTOR_STORE_PROVIDER: ${VECTOR_STORE_PROVIDER:-pgvector}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
  EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
  CHANNEL_GATEWAY_PROVIDER: ${CHANNEL_GATEWAY_PROVIDER:-feishu}
  DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:-}
  DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
  DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
  DISCORD_API_BASE_URL: ${DISCORD_API_BASE_URL:-https://discord.com/api/v10}
  DISCORD_ALLOWED_GUILD_IDS: ${DISCORD_ALLOWED_GUILD_IDS:-}
  DISCORD_ALLOWED_CHANNEL_IDS: ${DISCORD_ALLOWED_CHANNEL_IDS:-}
  DISCORD_INTERACTION_CALLBACK_PATH: ${DISCORD_INTERACTION_CALLBACK_PATH:-/discord/interactions}
  DISCORD_COMMAND_REGISTER_GUILD_ID: ${DISCORD_COMMAND_REGISTER_GUILD_ID:-}
  DISCORD_SIGNATURE_MAX_AGE_SECONDS: ${DISCORD_SIGNATURE_MAX_AGE_SECONDS:-300}
  DISCORD_INTERACTION_ACK_TIMEOUT_SECONDS: ${DISCORD_INTERACTION_ACK_TIMEOUT_SECONDS:-3}
  DISCORD_OUTBOX_MAX_ATTEMPTS: ${DISCORD_OUTBOX_MAX_ATTEMPTS:-5}
  MODEL_SECRET_ENCRYPTION_KEY: ${MODEL_SECRET_ENCRYPTION_KEY:?set MODEL_SECRET_ENCRYPTION_KEY}
  MODEL_PROVIDER_ALLOWLIST: ${MODEL_PROVIDER_ALLOWLIST:-openai,deepseek}
  SOP_REGISTRY_PATH: ${SOP_REGISTRY_PATH:-docs/agent-sops}
  MEMORY_RETRIEVAL_TOP_K: ${MEMORY_RETRIEVAL_TOP_K:-5}
  MEMORY_MAX_TOKENS_PER_AGENT: ${MEMORY_MAX_TOKENS_PER_AGENT:-800}
  MEMORY_RUN_RETENTION_DAYS: ${MEMORY_RUN_RETENTION_DAYS:-30}
  MEMORY_LONG_RETENTION_DAYS: ${MEMORY_LONG_RETENTION_DAYS:-90}
  CONTEXT_PACK_MAX_TOKENS: ${CONTEXT_PACK_MAX_TOKENS:-3000}
  FEISHU_BASE_URL: ${FEISHU_BASE_URL:-https://open.feishu.cn}
  FEISHU_APP_ID: ${FEISHU_APP_ID:-}
  FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
  FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
  FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
  FEISHU_DEFAULT_CHAT_ID: ${FEISHU_DEFAULT_CHAT_ID:-}
  FEISHU_BITABLE_APP_TOKEN: ${FEISHU_BITABLE_APP_TOKEN:-}
  FEISHU_BITABLE_REQUISITION_TABLE_ID: ${FEISHU_BITABLE_REQUISITION_TABLE_ID:-}
  FEISHU_BITABLE_CANDIDATE_TABLE_ID: ${FEISHU_BITABLE_CANDIDATE_TABLE_ID:-}
  FEISHU_BITABLE_TALENT_MAP_TABLE_ID: ${FEISHU_BITABLE_TALENT_MAP_TABLE_ID:-}
  FEISHU_BITABLE_REPORT_TABLE_ID: ${FEISHU_BITABLE_REPORT_TABLE_ID:-}
  LLM_PROVIDER: ${LLM_PROVIDER:-}
  LLM_MODEL: ${LLM_MODEL:-}
  LLM_API_KEY: ${LLM_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
  DEEPSEEK_THINKING: ${DEEPSEEK_THINKING:-enabled}
  DEEPSEEK_REASONING_EFFORT: ${DEEPSEEK_REASONING_EFFORT:-high}
  OUTBOX_WORKER_ID: ${OUTBOX_WORKER_ID:-}
  OUTBOX_POLL_SECONDS: ${OUTBOX_POLL_SECONDS:-2}
  DATABASE_WAIT_SECONDS: ${DATABASE_WAIT_SECONDS:-60}

services:
  api:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-5}
    image: lietou-api:local
    container_name: lietou-api
    restart: unless-stopped
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      default:
      shared_gateway:
        aliases:
          - lietou-api
          - headhunt-api
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    image: lietou-api:local
    container_name: lietou-worker
    restart: unless-stopped
    command: ["lietou-outbox-worker"]
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "false"
      OUTBOX_WORKER_ID: ${OUTBOX_WORKER_ID:-compose-worker}
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    container_name: lietou-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lietou}
      POSTGRES_USER: ${POSTGRES_USER:-lietou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-lietou} -d ${POSTGRES_DB:-lietou}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    container_name: lietou-caddy
    profiles:
      - standalone
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  shared_gateway:
    external: true
    name: ${SHARED_CADDY_NETWORK:-shared_gateway}
